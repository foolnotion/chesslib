name: CI

on:
  push:
    branches: [master, refactor]
  pull_request:

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Configure
        run: nix develop --command cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -Dchesslib_DEVELOPER_MODE=ON

      - name: Build
        run: nix develop --command cmake --build build

      - name: Test
        run: nix develop --command ctest --test-dir build --output-on-failure

      - name: Install
        run: nix develop --command cmake --install build --prefix "$RUNNER_TEMP/chesslib-install"

      - name: Verify installed package
        run: >-
          nix develop --command cmake -S test/package-install -B build/package-install
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/chesslib-install"

      - name: Build installed-package consumer
        run: nix develop --command cmake --build build/package-install

      - name: Run installed-package consumer
        run: ./build/package-install/chesslib_package_smoke

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Configure
        run: nix develop --command cmake -S . -B build --preset clang-tidy-only

      - name: Analyze
        run: nix develop --command cmake --build build
