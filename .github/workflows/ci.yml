name: CI

on:
  push:
    branches: [master, refactor]
  pull_request:

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Configure
        run: nix develop --command cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -Dchesslib_DEVELOPER_MODE=ON

      - name: Build
        run: nix develop --command cmake --build build

      - name: Test
        run: nix develop --command ctest --test-dir build --output-on-failure

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Configure
        run: nix develop --command cmake -S . -B build --preset clang-tidy-only

      - name: Analyze
        run: nix develop --command cmake --build build

  mirror:
    name: Mirror to Sourcehut
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Sourcehut
        run: |
          git remote add sourcehut https://bogdanb:${{ secrets.SOURCEHUT_TOKEN }}@git.sr.ht/~bogdanb/chesslib
          git push sourcehut HEAD:${{ github.ref_name }}
